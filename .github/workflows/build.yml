name: Build & Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 代码质量检查（包括 TypeScript 和 Rust）
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: wisweep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm (global)
        run: npm install -g pnpm@9

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript type check
        run: pnpm tsc --noEmit

      # 关键：安装 Rust 环境（cargo、rustc 等）
      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup component add rustfmt clippy
          rustc --version
          cargo --version

      - name: Rust check (cargo check)
        run: cargo check --manifest-path src-tauri/Cargo.toml

  # 跨平台构建（仅当打 tag 时运行）
  build:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: wisweep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm (global)
        run: npm install -g pnpm@9

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend (Vite/React)
        run: pnpm build

      # 安装 Rust（构建 Tauri 需要）
      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}
          rustc --version
          cargo --version

      # 仅在 Linux 下需要系统依赖（当前矩阵只有 Windows，此步不会执行，保留以备扩展）
      - name: Install Tauri dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: wisweep
          tagName: ${{ github.ref_name }}
          releaseName: '智净大师 v__VERSION__'
          releaseBody: '请查看 [RELEASE_NOTES.md] 了解本版本的变更。'
          releaseDraft: true
          prerelease: false
          args: --release --bundles ${{ matrix.bundles }}